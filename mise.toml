[tools]
python = "3.12"

[tasks.format]
description = "Format code with ruff"
run = "ruff format ."

[tasks.lint]
description = "Lint with ruff"
run = "ruff check ."

[tasks.typecheck]
description = "Type-check with basedpyright"
run = "basedpyright"

[tasks.checks]
description = "Run format, lint, and type-check"
depends = ["format", "lint", "typecheck"]

[tasks.tests]
description = "Run tests with pytest"
run = "pytest"

[tasks.ci]
description = "Run tests and checks (for CI)"
depends = ["tests", "checks"]
