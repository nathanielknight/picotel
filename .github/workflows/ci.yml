name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run CI
        run: mise run ci
